<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>种草监控 - 奇趣XR酒店管理平台</title>
  <link rel="stylesheet" href="../assets/css/theme.css?v=77">
  <link rel="stylesheet" href="../assets/css/common.css?v=77">
  <link rel="stylesheet" href="../assets/css/pages/ops.css?v=77">
</head>
<body>
  <div class="app-wrapper">
    <div id="header"></div>
    <main class="page-content page-content--with-header">

      <!-- 时段切换 -->
      <div class="off-period">
        <div class="off-period__tabs" id="periodTabs">
          <button type="button" class="off-period__tab" data-period="day">日</button>
          <button type="button" class="off-period__tab" data-period="week">周</button>
          <button type="button" class="off-period__tab is-active" data-period="month">月</button>
          <button type="button" class="off-period__tab" data-period="custom">自定义</button>
        </div>
        <div class="off-period__nav" id="periodNav">
          <button class="btn btn--ghost btn--sm" id="periodPrevBtn" type="button">‹</button>
          <div class="off-period__label" id="periodLabel">-</div>
          <button class="btn btn--ghost btn--sm" id="periodNextBtn" type="button">›</button>
        </div>
        <div class="off-period__custom" id="periodCustom" style="display:none;">
          <input type="date" id="customStart" class="form-input form-input--sm">
          <span class="off-period__custom-sep">~</span>
          <input type="date" id="customEnd" class="form-input form-input--sm">
        </div>
      </div>

      <!-- 搜索 + 三筛选 -->
      <div class="sm-toolbar sm-toolbar--search">
        <div class="sm-search-box">
          <input type="text" id="hotelSearch" class="sm-search-input" placeholder="搜索酒店名称">
          <button type="button" class="sm-search-clear" id="hotelSearchClear" title="清空" style="display:none;">×</button>
        </div>
        <div class="sm-filter-row">
          <button type="button" class="ops-multi-btn" data-filter="ownerOps">
            <span class="ops-multi-btn__label" id="filterOpsLabel">运营（全部）</span>
            <span class="ops-multi-btn__arrow">▼</span>
          </button>
          <button type="button" class="ops-multi-btn" data-filter="ownerSales">
            <span class="ops-multi-btn__label" id="filterSalesLabel">销售（全部）</span>
            <span class="ops-multi-btn__arrow">▼</span>
          </button>
          <button type="button" class="ops-multi-btn" data-filter="province">
            <span class="ops-multi-btn__label" id="filterProvinceLabel">省份（全部）</span>
            <span class="ops-multi-btn__arrow">▼</span>
          </button>
        </div>
      </div>

      <!-- 5 KPI 卡 -->
      <div class="sm-kpi-grid" id="kpiGrid"></div>

      <!-- 排序条 -->
      <div class="sm-sort-bar">
        <span class="sm-sort-bar__label">排序</span>
        <select id="sortKeySelect" class="sm-sort-bar__select">
          <option value="exposure">按总曝光</option>
          <option value="posts">按总发布</option>
          <option value="interact">按总互动</option>
          <option value="engRate">按互动率</option>
        </select>
        <button type="button" class="sm-sort-bar__order" id="sortOrderBtn" data-order="desc">↓ 倒序</button>
        <span class="sm-sort-bar__count" id="hotelCountHint">- 家</span>
      </div>

      <!-- 酒店卡片列表 -->
      <section class="sm-section sm-section--flush">
        <div id="hotelCardList"></div>
      </section>
    </main>

    <div class="ops-popup" id="multiPopup" style="display:none;">
      <div class="ops-popup__mask" id="multiPopupMask"></div>
      <div class="ops-popup__sheet">
        <div class="ops-popup__head">
          <div class="ops-popup__title" id="multiPopupTitle">筛选</div>
          <button type="button" class="ops-popup__close" id="multiPopupClose">×</button>
        </div>
        <div class="ops-popup__body" id="multiPopupBody"></div>
        <div class="ops-popup__actions">
          <button type="button" class="btn btn--outline btn--block" id="multiPopupSelectAll">全选</button>
          <button type="button" class="btn btn--outline btn--block" id="multiPopupClear">清空</button>
          <button type="button" class="btn btn--primary btn--block" id="multiPopupConfirm">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../assets/js/mock/operations.js?v=77"></script>
  <script src="../assets/js/mock/seed-monitor.js?v=77"></script>
  <script src="../assets/js/utils.js?v=77"></script>
  <script src="../assets/js/components/header.js?v=77"></script>
  <script>
    const role = (Utils.getUrlParam('role') || 'middle').trim();

    Header.render('#header', {
      title: '种草监控',
      showBack: true,
      backHref: `ops-board.html?role=${encodeURIComponent(role)}&ops=all`
    });

    // —— 工具 ——
    const MIN_DATE = '2026-01-01';
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function clampDate(s) {
      let v = String(s || todayStr());
      if (v < MIN_DATE) v = MIN_DATE;
      if (v > todayStr()) v = todayStr();
      return v;
    }
    function fmtDateLabel(s) {
      const str = String(s || '');
      if (!/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
      return `${str.slice(0,4)}/${str.slice(5,7)}/${str.slice(8,10)}`;
    }
    function shiftDate(s, days) {
      const [y, m, d] = s.split('-').map(Number);
      const dt = new Date(y, m - 1, d);
      dt.setDate(dt.getDate() + days);
      return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    }
    function shiftMonth(s, step) {
      const [y, m, d] = s.split('-').map(Number);
      const dt = new Date(y, m - 1 + step, 1);
      return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`;
    }
    function fmtNum(n) {
      const v = Math.round(Number(n) || 0);
      return v.toLocaleString('zh-CN');
    }
    function fmtKpiNum(n) {
      const v = Math.round(Number(n) || 0);
      if (v >= 100000000) return `${(v / 100000000).toFixed(1)}亿`;
      if (v >= 10000) {
        const s = (v / 10000).toFixed(v >= 100000 ? 0 : 1);
        return `${s}万`;
      }
      return v.toLocaleString('zh-CN');
    }
    function fmtPct(rate, digits = 2) {
      const v = Number(rate) || 0;
      return `${(v * 100).toFixed(digits)}%`;
    }
    function dash() { return '<span class="sm-dash">-</span>'; }

    // —— 状态 ——
    let periodMode = 'month'; // 默认本月（按酒店维度数据更丰富）
    let periodAnchor = todayStr();
    let customStart = todayStr();
    let customEnd = todayStr();
    let filters = { ownerOps: [], ownerSales: [], province: [] };
    let keyword = '';
    let sortKey = 'exposure';
    let sortOrder = 'desc';

    document.getElementById('customStart').value = customStart;
    document.getElementById('customEnd').value = customEnd;
    document.getElementById('customStart').min = MIN_DATE;
    document.getElementById('customStart').max = todayStr();
    document.getElementById('customEnd').min = MIN_DATE;
    document.getElementById('customEnd').max = todayStr();

    function getCurrentRange() {
      return Utils.getSeedDateRangeByPeriod(periodMode, periodAnchor, customStart, customEnd);
    }
    function multiLabel(prefix, sel, total) {
      if (!sel.length || sel.length === total) return `${prefix}（全部）`;
      if (sel.length === 1) return `${prefix}：${sel[0]}`;
      return `${prefix}：${sel.length}项`;
    }

    // —— 多选弹窗 ——
    const popupEl = document.getElementById('multiPopup');
    const popupTitleEl = document.getElementById('multiPopupTitle');
    const popupBodyEl = document.getElementById('multiPopupBody');
    const popupSelectAllBtn = document.getElementById('multiPopupSelectAll');
    const popupClearBtn = document.getElementById('multiPopupClear');
    const popupConfirmBtn = document.getElementById('multiPopupConfirm');
    const popupMaskEl = document.getElementById('multiPopupMask');
    const popupCloseBtn = document.getElementById('multiPopupClose');
    let popupContext = null;
    function isPopupAllSelected() {
      if (!popupContext || !popupContext.options.length) return false;
      return popupContext.options.every((o) => popupContext.selected.has(o.value));
    }
    function updatePopupSelectAllBtn() {
      if (!popupContext) return;
      popupSelectAllBtn.disabled = !popupContext.options.length;
      popupSelectAllBtn.textContent = isPopupAllSelected() ? '取消全选' : '全选';
    }
    function renderPopupBody() {
      if (!popupContext) return;
      popupBodyEl.innerHTML = popupContext.options.map((opt) => `
        <label class="ops-check-item">
          <input type="checkbox" value="${opt.value}" ${popupContext.selected.has(opt.value) ? 'checked' : ''}>
          <span class="ops-check-item__label">${opt.label}</span>
        </label>
      `).join('') || '<div class="fin-empty-hint">暂无可选项</div>';
      updatePopupSelectAllBtn();
    }
    function openFilterPopup(filterKey) {
      const opts = (Utils.getSeedFilterOptions()[filterKey] || []).map((v) => ({ value: v, label: v }));
      popupContext = {
        kind: filterKey,
        options: opts,
        selected: new Set((filters[filterKey] || []).filter((x) => opts.some((o) => o.value === x)))
      };
      const titleMap = { ownerOps: '运营', ownerSales: '销售', province: '省份' };
      popupTitleEl.textContent = titleMap[filterKey] || '筛选';
      renderPopupBody();
      popupEl.style.display = 'flex';
    }
    function closeMultiPopup() {
      popupEl.style.display = 'none';
      popupContext = null;
    }
    popupBodyEl.addEventListener('change', (e) => {
      const t = e.target;
      if (!t || t.tagName !== 'INPUT' || !popupContext) return;
      if (t.checked) popupContext.selected.add(t.value);
      else popupContext.selected.delete(t.value);
      updatePopupSelectAllBtn();
    });
    popupSelectAllBtn.addEventListener('click', () => {
      if (!popupContext) return;
      if (isPopupAllSelected()) popupContext.selected.clear();
      else popupContext.selected = new Set(popupContext.options.map((o) => o.value));
      renderPopupBody();
    });
    popupClearBtn.addEventListener('click', () => {
      if (!popupContext) return;
      popupContext.selected.clear();
      renderPopupBody();
    });
    popupConfirmBtn.addEventListener('click', () => {
      if (!popupContext) return;
      filters[popupContext.kind] = [...popupContext.selected];
      closeMultiPopup();
      render();
    });
    popupMaskEl.addEventListener('click', closeMultiPopup);
    popupCloseBtn.addEventListener('click', closeMultiPopup);

    // —— 时段渲染 ——
    function nextAnchor(anchor, mode, step) {
      if (mode === 'day') return shiftDate(anchor, step);
      if (mode === 'week') return shiftDate(anchor, step * 7);
      if (mode === 'month') return shiftMonth(anchor, step);
      return anchor;
    }
    function renderPeriod() {
      document.querySelectorAll('.off-period__tab').forEach((btn) => {
        if (btn.dataset.period === periodMode) btn.classList.add('is-active');
        else btn.classList.remove('is-active');
      });
      const navEl = document.getElementById('periodNav');
      const customEl = document.getElementById('periodCustom');
      if (periodMode === 'custom') {
        navEl.style.display = 'none';
        customEl.style.display = 'flex';
      } else {
        navEl.style.display = 'flex';
        customEl.style.display = 'none';
        const range = getCurrentRange();
        const labelEl = document.getElementById('periodLabel');
        if (periodMode === 'day') {
          labelEl.textContent = fmtDateLabel(range.startDate);
        } else if (periodMode === 'week') {
          labelEl.textContent = `${fmtDateLabel(range.startDate)} ~ ${fmtDateLabel(range.endDate)}`;
        } else if (periodMode === 'month') {
          const [y, m] = range.startDate.split('-');
          labelEl.textContent = `${y}/${m}`;
        }
        const prevAnchor = nextAnchor(periodAnchor, periodMode, -1);
        const nextAnchorVal = nextAnchor(periodAnchor, periodMode, 1);
        document.getElementById('periodPrevBtn').disabled = prevAnchor < MIN_DATE;
        document.getElementById('periodNextBtn').disabled = nextAnchorVal > todayStr();
      }
    }

    // —— 筛选标签 ——
    function renderFilterLabels() {
      const opts = Utils.getSeedFilterOptions();
      document.getElementById('filterOpsLabel').textContent =
        multiLabel('运营', filters.ownerOps, opts.ownerOps.length);
      document.getElementById('filterSalesLabel').textContent =
        multiLabel('销售', filters.ownerSales, opts.ownerSales.length);
      document.getElementById('filterProvinceLabel').textContent =
        multiLabel('省份', filters.province, opts.province.length);
    }

    // —— KPI ——
    function renderKpi(summary) {
      const passRatio = summary.allMatrixCount
        ? summary.qualifiedMatrixCount / summary.allMatrixCount : 0;
      const passClass = passRatio >= 1 ? 'sm-kpi-card--ok'
        : passRatio >= 0.6 ? 'sm-kpi-card--warn' : 'sm-kpi-card--bad';
      const html = `
        <div class="sm-kpi-card">
          <div class="sm-kpi-card__label">总发布</div>
          <div class="sm-kpi-card__value">${fmtKpiNum(summary.totalPosts)}<span class="sm-kpi-card__unit">篇</span></div>
          <div class="sm-kpi-card__sub">本期累计</div>
        </div>
        <div class="sm-kpi-card ${passClass}">
          <div class="sm-kpi-card__label">达标率</div>
          <div class="sm-kpi-card__value">${(passRatio * 100).toFixed(0)}<span class="sm-kpi-card__unit">%</span></div>
          <div class="sm-kpi-card__sub">${summary.qualifiedMatrixCount}/${summary.allMatrixCount} 矩阵号</div>
        </div>
        <div class="sm-kpi-card">
          <div class="sm-kpi-card__label">总曝光</div>
          <div class="sm-kpi-card__value">${fmtKpiNum(summary.totalExposure)}</div>
          <div class="sm-kpi-card__sub">所选酒店</div>
        </div>
        <div class="sm-kpi-card">
          <div class="sm-kpi-card__label">总互动</div>
          <div class="sm-kpi-card__value">${fmtKpiNum(summary.totalInteract)}</div>
          <div class="sm-kpi-card__sub">赞+评+藏+转</div>
        </div>
        <div class="sm-kpi-card">
          <div class="sm-kpi-card__label">覆盖酒店</div>
          <div class="sm-kpi-card__value">${fmtNum(summary.coveredHotelCount)}<span class="sm-kpi-card__unit">家</span></div>
          <div class="sm-kpi-card__sub">/${summary.allHotelCount} 家</div>
        </div>
      `;
      document.getElementById('kpiGrid').innerHTML = html;
    }

    // —— 酒店卡片列表 ——
    function renderHotelList(hotelRows) {
      const container = document.getElementById('hotelCardList');
      if (!hotelRows.length) {
        container.innerHTML = '<div class="sm-empty">暂无符合条件的酒店</div>';
        return;
      }
      container.innerHTML = hotelRows.map((h) => {
        const drillHref = `ops-seed-monitor-detail.html?role=${encodeURIComponent(role)}&hotelId=${encodeURIComponent(h.hotelId)}&periodMode=${encodeURIComponent(periodMode)}&periodAnchor=${encodeURIComponent(periodAnchor)}&customStart=${encodeURIComponent(customStart)}&customEnd=${encodeURIComponent(customEnd)}`;
        const meta = [h.province, h.ownerOps && `运营 ${h.ownerOps}`, h.ownerSales && `销售 ${h.ownerSales}`]
          .filter(Boolean).join(' · ');
        const isCold = h.total.posts === 0;
        return `
          <a class="sm-hotel-card ${isCold ? 'sm-hotel-card--cold' : ''}" href="${drillHref}">
            <div class="sm-hotel-card__head">
              <div class="sm-hotel-card__name">${h.hotelName}</div>
              <span class="sm-hotel-card__arrow">›</span>
            </div>
            <div class="sm-hotel-card__meta">${meta}</div>
            <div class="sm-hotel-card__metrics">
              <div class="sm-hotel-metric">
                <div class="sm-hotel-metric__label">发布</div>
                <div class="sm-hotel-metric__value">${h.total.posts > 0 ? fmtNum(h.total.posts) : '-'}</div>
              </div>
              <div class="sm-hotel-metric">
                <div class="sm-hotel-metric__label">曝光</div>
                <div class="sm-hotel-metric__value">${h.total.exposure > 0 ? fmtKpiNum(h.total.exposure) : '-'}</div>
              </div>
              <div class="sm-hotel-metric">
                <div class="sm-hotel-metric__label">互动</div>
                <div class="sm-hotel-metric__value">${h.total.interact > 0 ? fmtKpiNum(h.total.interact) : '-'}</div>
              </div>
              <div class="sm-hotel-metric">
                <div class="sm-hotel-metric__label">互动率</div>
                <div class="sm-hotel-metric__value">${h.total.exposure > 0 ? fmtPct(h.total.engRate, 2) : '-'}</div>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }

    function render() {
      renderPeriod();
      renderFilterLabels();
      const range = getCurrentRange();
      const result = Utils.aggregateSeedHotels({
        startDate: range.startDate, endDate: range.endDate,
        filters, keyword, sortKey, sortOrder
      });
      renderKpi(result.summary);
      renderHotelList(result.hotels);
      document.getElementById('hotelCountHint').textContent = `${result.summary.coveredHotelCount}/${result.summary.allHotelCount} 家有发布`;
    }

    // —— 事件 ——
    document.getElementById('periodTabs').addEventListener('click', (e) => {
      const btn = e.target.closest('[data-period]');
      if (!btn) return;
      const next = btn.dataset.period;
      if (next === periodMode) return;
      periodMode = next;
      if (periodMode === 'custom') {
        customStart = clampDate(customStart);
        customEnd = clampDate(customEnd);
        document.getElementById('customStart').value = customStart;
        document.getElementById('customEnd').value = customEnd;
      } else {
        periodAnchor = todayStr();
      }
      render();
    });
    document.getElementById('periodPrevBtn').addEventListener('click', () => {
      const next = nextAnchor(periodAnchor, periodMode, -1);
      if (next < MIN_DATE) return;
      periodAnchor = next;
      render();
    });
    document.getElementById('periodNextBtn').addEventListener('click', () => {
      const next = nextAnchor(periodAnchor, periodMode, 1);
      if (next > todayStr()) return;
      periodAnchor = next;
      render();
    });
    document.getElementById('customStart').addEventListener('change', (e) => {
      customStart = clampDate(e.target.value);
      e.target.value = customStart;
      if (customStart > customEnd) {
        customEnd = customStart;
        document.getElementById('customEnd').value = customEnd;
      }
      render();
    });
    document.getElementById('customEnd').addEventListener('change', (e) => {
      customEnd = clampDate(e.target.value);
      e.target.value = customEnd;
      if (customEnd < customStart) {
        customStart = customEnd;
        document.getElementById('customStart').value = customStart;
      }
      render();
    });

    // 筛选按钮
    document.querySelectorAll('[data-filter]').forEach((btn) => {
      btn.addEventListener('click', () => openFilterPopup(btn.dataset.filter));
    });

    // 搜索框
    const searchInput = document.getElementById('hotelSearch');
    const searchClearBtn = document.getElementById('hotelSearchClear');
    let searchTimer = null;
    searchInput.addEventListener('input', (e) => {
      keyword = e.target.value;
      searchClearBtn.style.display = keyword ? 'flex' : 'none';
      clearTimeout(searchTimer);
      searchTimer = setTimeout(render, 200);
    });
    searchClearBtn.addEventListener('click', () => {
      keyword = '';
      searchInput.value = '';
      searchClearBtn.style.display = 'none';
      render();
    });

    // 排序
    document.getElementById('sortKeySelect').addEventListener('change', (e) => {
      sortKey = e.target.value;
      render();
    });
    document.getElementById('sortOrderBtn').addEventListener('click', (e) => {
      sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
      e.currentTarget.dataset.order = sortOrder;
      e.currentTarget.textContent = sortOrder === 'desc' ? '↓ 倒序' : '↑ 顺序';
      render();
    });

    render();
  </script>
</body>
</html>
